services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nevup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nevup}
      POSTGRES_DB: ${POSTGRES_DB:-nevup}
    # Defaults are too tight for the 200 RPS target. Raise max_connections so
    # the API + worker pools don't exhaust pg, bump shared_buffers so hot
    # working set stays in RAM, and disable synchronous_commit to remove the
    # fsync barrier from the trade write path. The trade table is durable on
    # crash to within a few hundred ms of writes, which is acceptable for a
    # behavioral analytics journal (we are not running money settlement here).
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "synchronous_commit=off"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nevup} -d ${POSTGRES_DB:-nevup}"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET:-97791d4db2aa5f689c3cc39356ce35762f0a73aa70923039d8ef72a2840a1b02}
      DATABASE_URL: postgres://${POSTGRES_USER:-nevup}:${POSTGRES_PASSWORD:-nevup}@postgres:5432/${POSTGRES_DB:-nevup}
      REDIS_URL: redis://redis:6379
      API_PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      RUN_MIGRATIONS: "true"
      RUN_SEED: "true"
      PG_POOL_MAX: "150"
      UV_THREADPOOL_SIZE: "16"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-nevup}:${POSTGRES_PASSWORD:-nevup}@postgres:5432/${POSTGRES_DB:-nevup}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      # Keep the worker's pg footprint small so it never starves the API hot
      # path. Async metric work is allowed to lag — that is the entire point
      # of moving it off the write path.
      PG_POOL_MAX: "8"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000
        VITE_JWT_SECRET: ${JWT_SECRET:-97791d4db2aa5f689c3cc39356ce35762f0a73aa70923039d8ef72a2840a1b02}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  postgres-data:
  redis-data:
