app = "nevup-web"
primary_region = "iad"

[build]
  dockerfile = "web/Dockerfile"

  [build.args]
    VITE_API_BASE_URL = "https://nevup-api.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    protocol = "http"
    timeout = "3s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
