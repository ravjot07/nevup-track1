app = "nevup-api"
primary_region = "iad"

[build]
  dockerfile = "api/Dockerfile"

[env]
  NODE_ENV = "production"
  API_PORT = "3000"
  LOG_LEVEL = "info"
  RUN_MIGRATIONS = "true"
  RUN_SEED = "true"
  PG_POOL_MAX = "30"
  UV_THREADPOOL_SIZE = "16"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "3s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
