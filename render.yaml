databases:
  - name: nevup-pg
    plan: free
    databaseName: nevup
    user: nevup
    region: singapore
    postgresMajorVersion: "16"

services:
  - type: web
    name: nevup-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: API_PORT
        value: "3000"
      - key: LOG_LEVEL
        value: info
      - key: RUN_MIGRATIONS
        value: "true"
      - key: RUN_SEED
        value: "true"
      - key: PG_POOL_MAX
        value: "10"
      - key: UV_THREADPOOL_SIZE
        value: "8"
      - key: EMBED_WORKER
        value: "true"
      - key: JWT_SECRET
        value: 97791d4db2aa5f689c3cc39356ce35762f0a73aa70923039d8ef72a2840a1b02
      - key: DATABASE_URL
        fromDatabase:
          name: nevup-pg
          property: connectionString
      - key: REDIS_URL
        sync: false

  - type: web
    name: nevup-web
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./web/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "80"
      - key: VITE_API_BASE_URL
        sync: false
